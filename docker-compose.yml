services:
  postgres:
    image: postgres:16-alpine
    container_name: typeahead-db
    environment:
      POSTGRES_USER: typeahead
      POSTGRES_PASSWORD: typeahead
      POSTGRES_DB: typeahead
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
